create:
  name: Create Alert
  description: Create a new HA Alert entity.
  fields:
    name:
      name: Name
      description: Friendly name for the alert entity.
      required: true
      selector:
        text:
    trigger_template:
      name: Trigger Template
      description: Template that evaluates to true when the alert should fire.
      required: true
      selector:
        template:
    repeat:
      name: Repeat Interval
      description: Minutes between repeated notifications while the alert is active.
      required: true
      selector:
        number:
          min: 1
          max: 9999
          step: 1
          unit_of_measurement: minutes
    skip_first:
      name: Skip First
      description: Skip the first notification and only notify on repeat.
      default: false
      selector:
        boolean:
    notifiers:
      name: Notifiers
      description: List of notify service names to call (e.g. telegram, mobile_app_pixel_10).
      required: true
      selector:
        text:
          multiple: true
    message:
      name: Message
      description: Message template to send when the alert fires.
      selector:
        template:
    done_message:
      name: Done Message
      description: Message template to send when the alert resolves.
      selector:
        template:
    title:
      name: Title
      description: Optional title template for the notification.
      selector:
        template:
    data:
      name: Data
      description: Optional extra data payload for the notification service.
      selector:
        object:

update:
  name: Update Alert
  description: Hot-update a live HA Alert entity without reloading.
  fields:
    entity_id:
      name: Entity
      description: The alert entity to update.
      required: true
      selector:
        entity:
          domain: switch
          integration: ha_alerts
    trigger_template:
      name: Trigger Template
      description: New trigger template.
      selector:
        template:
    repeat:
      name: Repeat Interval
      description: New repeat interval in minutes.
      selector:
        number:
          min: 1
          max: 9999
          step: 1
          unit_of_measurement: minutes
    skip_first:
      name: Skip First
      description: Skip the first notification.
      selector:
        boolean:
    notifiers:
      name: Notifiers
      description: New list of notify service names.
      selector:
        text:
          multiple: true
    message:
      name: Message
      description: New message template.
      selector:
        template:
    done_message:
      name: Done Message
      description: New done message template.
      selector:
        template:
    title:
      name: Title
      description: New title template.
      selector:
        template:
    data:
      name: Data
      description: New extra data payload.
      selector:
        object:

delete:
  name: Delete Alert
  description: Remove an HA Alert entity and its config entry.
  fields:
    entity_id:
      name: Entity
      description: The alert entity to delete.
      required: true
      selector:
        entity:
          domain: switch
          integration: ha_alerts
