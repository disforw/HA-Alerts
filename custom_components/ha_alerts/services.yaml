create:
  fields:
    name:
      required: true
      selector:
        text:
    entity_id:
      required: true
      selector:
        entity:
    state:
      default: "on"
      selector:
        text:
    repeat:
      required: true
      example: "30"
      selector:
        number:
          min: 1
          max: 9999
          step: 1
          unit_of_measurement: minutes
    skip_first:
      default: false
      selector:
        boolean:
    notifiers:
      required: true
      selector:
        text:
          multiple: true
    message:
      selector:
        template:
    done_message:
      selector:
        template:
    title:
      selector:
        template:
    data:
      selector:
        object:

